<!-- 🔥 SUBSTITUA SEU ARQUIVO INTEIRO POR ESTE -->

<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evolua+ Corporativo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background:#0b132b;
  color:#fff;
}

.container {
  max-width:1200px;
  margin:0 auto;
  padding:0 20px;
}

/* HERO */
.hero {
  min-height:90vh;
  display:flex;
  align-items:center;
  background:
  linear-gradient(90deg, rgba(5,10,25,.9) 0%, rgba(5,10,25,.7) 40%, rgba(5,10,25,.3) 100%),
  url('assets/evolua-corporativo-capa.png') center/cover no-repeat;
}

.hero-grid {
  display:grid;
  grid-template-columns: minmax(0,600px) 1.3fr;
  align-items:center;
  gap:20px;
}

/* TEXTO */
.hero h1 {
  font-size:58px;
  line-height:1.1;
  font-weight:800;
}

.hero span {
  color:#f6b93b;
}

.hero p {
  margin-top:20px;
  font-size:20px;
  color:#d1d5db;
}

.hero-buttons {
  margin-top:30px;
  display:flex;
  gap:15px;
}

.btn {
  padding:16px 24px;
  border-radius:10px;
  font-weight:700;
  text-decoration:none;
}

.btn-primary {
  background:#f6b93b;
  color:#000;
}

.btn-secondary {
  border:1px solid #f6b93b;
  color:#fff;
}

/* 🔥 IMAGEM AJUSTADA (AQUI ESTÁ A MÁGICA) */
.hero-side {
  display:flex;
  justify-content:flex-end;
  align-items:flex-end;
  min-height:520px;
}

.hero-team {
  width:min(900px, 100%);
  transform: translateY(60px); /* desce pra ficar mais premium */
  filter: drop-shadow(0 30px 60px rgba(0,0,0,.4));
}

.hero-team img {
  width:100%;
}

/* RESPONSIVO */
@media(max-width:1000px){
  .hero-grid {
    grid-template-columns:1fr;
    text-align:center;
  }

  .hero-side {
    justify-content:center;
    align-items:center;
    margin-top:30px;
  }

  .hero-team {
    width:450px;
    transform:none;
  }

  .hero h1 {
    font-size:38px;
  }
}
</style>
</head>

<body>

<section class="hero">
  <div class="container hero-grid">

    <!-- TEXTO -->
    <div>
      <h1>
        Treinamentos corporativos que
        <span>desenvolvem equipes</span>
        e geram resultado real.
      </h1>

      <p>
        Capacitação prática para empresas que querem mais produtividade,
        padronização e crescimento profissional dos colaboradores.
      </p>

      <div class="hero-buttons">
        <a href="https://wa.me/5565996834279?text=Olá,%20vim%20do%20site%20corporativo%20da%20Evolua%2B%20e%20quero%20solicitar%20uma%20proposta" class="btn btn-primary">Solicitar proposta</a>

        <a href="https://wa.me/5565996834279?text=Olá,%20vim%20do%20site%20corporativo%20da%20Evolua%2B%20e%20quero%20falar%20com%20um%20consultor" class="btn btn-secondary">Falar com consultor</a>
      </div>
    </div>

    <!-- IMAGEM -->
    <div class="hero-side">
      <div class="hero-team">
        <img src="assets/hero-equipe-corporativa.png" alt="Equipe corporativa">
      </div>
    </div>

  </div>
</section>

</body>
</html>
